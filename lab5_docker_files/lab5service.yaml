apiVersion: v1
kind: Service
metadata:
  name: accountdb-service
spec:
  selector:
    app: accountdb
  ports:
  - port: 3306
    targetPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: transactiondb-service
spec:
  selector:
    app: transactiondb
  ports:
  - port: 3306
    targetPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: accountservice-service
spec:
  type: NodePort
  selector:
    app: accountservice
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30007

---
apiVersion: v1
kind: Service
metadata:
  name: transactionservice-service
spec:
  type: NodePort
  selector:
    app: transactionservice
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30008
