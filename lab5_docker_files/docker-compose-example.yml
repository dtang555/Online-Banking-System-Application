version: "3.9"
services:
  accountdb:
    build:
      context: .
      dockerfile: Dockerfile-accountdb
    container_name: accountdb
    ports:
      - "3307:3306"

  transactiondb:
    build:
      context: .
      dockerfile: Dockerfile-transactiondb
    container_name: transactiondb
    ports:
      - "3308:3306"

  accountservice:
    build:
      context: .
      dockerfile: Dockerfile-accountservice
    container_name: accountservice
    environment:
      DB_URL: accountdb:3306
      kubeMQAddress: kubemq-service:50000
    ports:
      - "8081:8080"
    depends_on:
      - accountdb

  transactionservice:
    build:
      context: .
      dockerfile: Dockerfile-transactionservice
    container_name: transactionservice
    environment:
      DB_URL: transactiondb:3306
      kubeMQAddress: kubemq-service:50000
    ports:
      - "8082:8080"
    depends_on:
      - transactiondb
